<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NETIZEN</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<header>
  <div class="logo">NETIZEN</div>
  <nav>
    <button onclick="showSection('prompts')">AI PROMPTS</button>
    <button onclick="showSection('products')">VIRAL PRODUCTS</button>
  </nav>
</header>

<section class="hero">
  <div class="hero-inner">
    <h1>CURATED DIGITAL INTELLIGENCE</h1>
    <p>Elite AI prompts & trending innovations for creators</p>
  </div>
</section>

<section id="prompts" class="content-section active">
  <div class="section-header">
    <h2>AI PROMPTS</h2>
    <input type="text" id="promptSearch" placeholder="Search prompts">
  </div>
  <div id="promptContainer" class="grid"></div>
</section>

<section id="products" class="content-section">
  <div class="section-header">
    <h2>VIRAL PRODUCTS</h2>
    <input type="text" id="productSearch" placeholder="Search products">
  </div>
  <div id="productContainer" class="grid"></div>
</section>

<script src="script.js"></script>
</body>
</html>
