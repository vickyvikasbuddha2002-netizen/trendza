<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NETIZEN</title>

<link rel="stylesheet" href="style.css">

<!-- Thin Futuristic Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<header>
  <div class="logo">NETIZEN</div>
  <nav>
    <button onclick="showSection('tools')">TOOLS</button>
    <button onclick="showSection('prompts')">AI PROMPTS</button>
    <button onclick="showSection('products')">VIRAL PRODUCTS</button>
  </nav>
</header>

<!-- TOOLS SECTION -->
<section id="tools" class="section active">
  <div class="section-title">9 GRID SPLITTER</div>

  <div class="tool-box">
    <input type="file" id="mediaInput">
    <button onclick="splitMedia()">CREATE</button>
  </div>

  <div id="outputGrid"></div>
</section>

<!-- PROMPTS SECTION -->
<section id="prompts" class="section">
  <div class="sticky-bar">
    <input type="text" id="promptSearch" placeholder="Search">
    <select id="promptSort">
      <option value="newest">Newest</option>
    </select>
  </div>

  <div id="promptContainer" class="grid"></div>
</section>

<!-- PRODUCTS SECTION -->
<section id="products" class="section">
  <div class="sticky-bar">
    <input type="text" id="productSearch" placeholder="Search">
    <select>
      <option>Newest</option>
    </select>
  </div>

  <div id="productContainer" class="grid"></div>
</section>

<script src="script.js"></script>
</body>
</html>
